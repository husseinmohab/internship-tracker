<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fall 2026 Internship Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --off: #f8f7f5;
    --border: #e8e6e1;
    --border-mid: #d4d1ca;
    --text: #1a1917;
    --muted: #6b6962;
    --hint: #a09d97;
    --tag-bg: #f0ede8;
    --tag-text: #4a4842;
    --new-bg: #f0f7f2;
    --new-text: #2a6645;
    --new-border: #b8ddc8;
    --saved-bg: #f5f0fc;
    --saved-text: #5a3d8a;
    --saved-border: #d4beee;
    --applied-bg: #f0f5ff;
    --applied-text: #2a4a8a;
    --applied-border: #b8c8ee;
    --skip-bg: #f7f7f7;
    --skip-text: #999;
    --skip-border: #ddd;
    --de-tag: #e8f4f0; --de-text: #1a5c45;
    --ds-tag: #f0eaf8; --ds-text: #5a2d91;
    --swe-tag: #fdf3e3; --swe-text: #8a5a00;
    --da-tag: #e8f0f8; --da-text: #1a3a6e;
    --re-tag: #fce8e8; --re-text: #8a1a1a;
    --ra-tag: #f0f8e8; --ra-text: #3a6a1a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 10px; }

  .logo-mark {
    width: 28px; height: 28px;
    background: var(--text);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-mark svg { width: 14px; height: 14px; }

  .logo-name { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }

  .header-meta {
    font-size: 12px; color: var(--hint);
    font-family: 'DM Mono', monospace;
    display: flex; align-items: center; gap: 6px;
  }

  .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3ab26a;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .page { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }

  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }

  .stat-label {
    font-size: 11px; color: var(--hint);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 500; margin-bottom: 4px;
  }

  .stat-value {
    font-size: 26px; font-weight: 300;
    letter-spacing: -0.03em;
    font-family: 'DM Mono', monospace;
  }

  .controls {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 1.5rem; flex-wrap: wrap;
  }

  .search-wrap { flex: 1; min-width: 200px; position: relative; }

  .search-wrap svg {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--hint);
  }

  input[type="text"] {
    width: 100%; height: 38px;
    border: 1px solid var(--border);
    border-radius: 8px; background: var(--white);
    padding: 0 12px 0 34px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text);
    outline: none; transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: var(--border-mid); }
  input[type="text"]::placeholder { color: var(--hint); }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .filter-btn {
    height: 34px; padding: 0 12px;
    border: 1px solid var(--border);
    border-radius: 7px; background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--muted);
    cursor: pointer; transition: all 0.12s; white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--border-mid); color: var(--text); }
  .filter-btn.active { background: var(--text); color: var(--white); border-color: var(--text); }

  .sort-select {
    height: 38px; padding: 0 10px;
    border: 1px solid var(--border);
    border-radius: 8px; background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--muted);
    cursor: pointer; outline: none;
  }

  .section-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--hint);
    font-weight: 500; margin-bottom: 0.75rem; padding-left: 2px;
  }

  .jobs-list { display: flex; flex-direction: column; }

  .job-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.75rem;
    align-items: start;
    transition: border-color 0.12s, box-shadow 0.12s;
    margin-bottom: 6px;
  }

  .job-card:hover {
    border-color: var(--border-mid);
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }

  .job-card.status-applied { opacity: 0.55; }
  .job-card.status-skip { opacity: 0.35; }

  .job-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }

  .company-logo {
    width: 34px; height: 34px;
    border-radius: 7px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.02em;
  }

  .job-title { font-size: 15px; font-weight: 500; margin-bottom: 2px; letter-spacing: -0.01em; }
  .job-company { font-size: 13px; color: var(--muted); }

  .job-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 8px; }

  .job-meta-item { font-size: 12px; color: var(--hint); display: flex; align-items: center; gap: 4px; }
  .job-meta-item svg { width: 12px; height: 12px; }

  .role-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 5px; letter-spacing: 0.02em; }

  .tag-de { background: var(--de-tag); color: var(--de-text); }
  .tag-ds { background: var(--ds-tag); color: var(--ds-text); }
  .tag-swe { background: var(--swe-tag); color: var(--swe-text); }
  .tag-da { background: var(--da-tag); color: var(--da-text); }
  .tag-re { background: var(--re-tag); color: var(--re-text); }
  .tag-ra { background: var(--ra-tag); color: var(--ra-text); }

  .new-badge {
    font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 5px;
    background: var(--new-bg); color: var(--new-text);
    border: 1px solid var(--new-border);
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  .maybe-badge {
    font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 5px;
    background: #fdf3e3; color: #7a4f00;
    border: 1px solid #f0c870;
    letter-spacing: 0.04em; text-transform: uppercase;
    cursor: help;
  }

  .job-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  .status-pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 6px; border: 1px solid; white-space: nowrap; }
  .pill-new { background: var(--new-bg); color: var(--new-text); border-color: var(--new-border); }
  .pill-saved { background: var(--saved-bg); color: var(--saved-text); border-color: var(--saved-border); }
  .pill-applied { background: var(--applied-bg); color: var(--applied-text); border-color: var(--applied-border); }
  .pill-skip { background: var(--skip-bg); color: var(--skip-text); border-color: var(--skip-border); }

  .action-btns { display: flex; gap: 4px; }

  .action-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px; background: var(--white);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.12s; color: var(--hint);
  }

  .action-btn:hover { border-color: var(--border-mid); color: var(--text); background: var(--off); }
  .action-btn svg { width: 12px; height: 12px; }

  .apply-btn {
    height: 30px; padding: 0 12px;
    background: var(--text); color: var(--white);
    border: none; border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer; text-decoration: none;
    display: flex; align-items: center; gap: 5px;
    transition: opacity 0.12s; white-space: nowrap;
  }

  .apply-btn:hover { opacity: 0.8; }
  .apply-btn svg { width: 11px; height: 11px; }

  .empty { text-align: center; padding: 4rem 2rem; color: var(--hint); }
  .empty-title { font-size: 16px; color: var(--muted); margin-bottom: 6px; font-weight: 400; }
  .empty-sub { font-size: 13px; }

  .footer-bar {
    margin-top: 2.5rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .footer-text { font-size: 12px; color: var(--hint); font-family: 'DM Mono', monospace; }

  .refresh-btn {
    height: 32px; padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: 7px; background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: all 0.12s;
  }

  .refresh-btn:hover { border-color: var(--border-mid); color: var(--text); }
  .refresh-btn svg { width: 12px; height: 12px; }

  .source-health {
    margin-top: 2rem;
    padding: 1.1rem 1.25rem;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .source-health-title {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--hint);
    font-weight: 500; margin-bottom: 0.75rem;
  }

  .source-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  .source-pill {
    font-size: 11px; padding: 3px 9px;
    border-radius: 6px; border: 1px solid;
    display: flex; align-items: center; gap: 5px;
    font-family: 'DM Mono', monospace;
  }

  .source-ok    { background: var(--new-bg);    color: var(--new-text);    border-color: var(--new-border); }
  .source-error { background: #fce8e8;           color: #8a1a1a;            border-color: #f0b8b8; }
  .source-none  { background: var(--skip-bg);   color: var(--skip-text);   border-color: var(--skip-border); }

  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  .skeleton {
    background: linear-gradient(90deg, #f0ede8 25%, #e8e5e0 50%, #f0ede8 75%);
    background-size: 800px 100%; animation: shimmer 1.4s infinite; border-radius: 5px;
  }

  .skeleton-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.1rem 1.25rem; margin-bottom: 6px;
  }

  .skel-line { height: 12px; margin-bottom: 8px; }

  @media (max-width: 680px) {
    header { padding: 0 1.25rem; }
    .page { padding: 1.5rem 1rem; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    .job-card { grid-template-columns: 1fr; }
    .job-actions { flex-direction: row; align-items: center; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="5" height="5" rx="1" fill="white"/>
        <rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity="0.5"/>
        <rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity="0.5"/>
        <rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity="0.25"/>
      </svg>
    </div>
    <span class="logo-name">Fall '26 Internships</span>
  </div>
  <div class="header-meta">
    <div class="pulse"></div>
    <span id="last-updated">loading...</span>
  </div>
</header>

<div class="page">

  <div class="summary">
    <div class="stat">
      <div class="stat-label">Total Found</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">New Today</div>
      <div class="stat-value" id="stat-new">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Saved</div>
      <div class="stat-value" id="stat-saved">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Applied</div>
      <div class="stat-value" id="stat-applied">—</div>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6.5" cy="6.5" r="4.5"/><path d="M11 11l3 3"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search by role, company, location…" />
    </div>

    <div class="filter-group" id="role-filters">
      <button class="filter-btn active" data-role="all">All</button>
      <button class="filter-btn" data-role="de">Data Eng</button>
      <button class="filter-btn" data-role="da">Data Analyst</button>
      <button class="filter-btn" data-role="ds">Data Science</button>
      <button class="filter-btn" data-role="swe">SWE</button>
      <button class="filter-btn" data-role="re">Research Eng</button>
      <button class="filter-btn" data-role="ra">Research / REU</button>
    </div>

    <div class="filter-group" id="status-filters">
      <button class="filter-btn active" data-status="all">All</button>
      <button class="filter-btn" data-status="new">New</button>
      <button class="filter-btn" data-status="saved">Saved</button>
      <button class="filter-btn" data-status="applied">Applied</button>
    </div>

    <button class="filter-btn" id="toggle-maybe" title="Hide jobs where start date is unspecified">Hide unconfirmed</button>

    <select class="sort-select" id="sort-select">
      <option value="date-desc">Newest first</option>
      <option value="date-asc">Oldest first</option>
      <option value="company">Company A–Z</option>
    </select>
  </div>

  <div class="section-label" id="results-label">— jobs</div>

  <div id="skeleton-list">
    <div class="skeleton-card">
      <div class="skel-line skeleton" style="width:50%;height:15px;"></div>
      <div class="skel-line skeleton" style="width:28%;"></div>
      <div class="skel-line skeleton" style="width:38%;margin-top:12px;height:10px;"></div>
    </div>
    <div class="skeleton-card">
      <div class="skel-line skeleton" style="width:44%;height:15px;"></div>
      <div class="skel-line skeleton" style="width:32%;"></div>
      <div class="skel-line skeleton" style="width:42%;margin-top:12px;height:10px;"></div>
    </div>
    <div class="skeleton-card">
      <div class="skel-line skeleton" style="width:38%;height:15px;"></div>
      <div class="skel-line skeleton" style="width:22%;"></div>
      <div class="skel-line skeleton" style="width:35%;margin-top:12px;height:10px;"></div>
    </div>
  </div>

  <div class="jobs-list" id="jobs-list" style="display:none;"></div>

  <div class="empty" id="empty-state" style="display:none;">
    <div class="empty-title">No jobs match your filters</div>
    <div class="empty-sub">Try adjusting your search or check back tomorrow for new postings.</div>
  </div>

  <div class="footer-bar">
    <span class="footer-text" id="footer-updated">—</span>
    <button class="refresh-btn" onclick="loadJobs()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12.5 7A5.5 5.5 0 112.5 4M2.5 1v3h3"/>
      </svg>
      Refresh
    </button>
  </div>

  <div class="source-health" id="source-health" style="display:none;">
    <div class="source-health-title">Source health — last run</div>
    <div class="source-grid" id="source-grid"></div>
  </div>

</div>

<script>
const ROLE_TAGS = {
  de:  { label: 'Data Engineering',   cls: 'tag-de' },
  da:  { label: 'Data Analyst / BI',  cls: 'tag-da' },
  ds:  { label: 'Data Science',       cls: 'tag-ds' },
  swe: { label: 'Software Eng',       cls: 'tag-swe' },
  re:  { label: 'Research Eng',       cls: 'tag-re' },
  ra:  { label: 'Research / REU',     cls: 'tag-ra' },
};

const logoColors     = ['#e8f0f8','#f0eaf8','#e8f4f0','#fdf3e3','#fce8e8','#f0f8e8'];
const logoTextColors = ['#1a3a6e','#5a2d91','#1a5c45','#8a5a00','#8a1a1a','#3a6a1a'];
let colorIdx = 0;
const companyColorMap = {};

function getCompanyColor(name) {
  if (!companyColorMap[name]) {
    companyColorMap[name] = {
      bg: logoColors[colorIdx % logoColors.length],
      text: logoTextColors[colorIdx % logoTextColors.length]
    };
    colorIdx++;
  }
  return companyColorMap[name];
}

function initials(c) {
  return c.split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

let allJobs = [];
let statusMap = {};

function loadStatusMap() {
  try { statusMap = JSON.parse(localStorage.getItem('job_statuses') || '{}'); } catch { statusMap = {}; }
}

function saveStatusMap() {
  localStorage.setItem('job_statuses', JSON.stringify(statusMap));
}

function getStatus(id) { return statusMap[id] || 'new'; }

function setStatus(id, status) { statusMap[id] = status; saveStatusMap(); }

function renderStats() {
  const today = new Date().toISOString().slice(0,10);
  const statuses = allJobs.map(j => getStatus(j.id));
  document.getElementById('stat-total').textContent   = allJobs.length;
  document.getElementById('stat-new').textContent     = allJobs.filter(j => j.posted_date === today).length;
  document.getElementById('stat-saved').textContent   = statuses.filter(s => s === 'saved').length;
  document.getElementById('stat-applied').textContent = statuses.filter(s => s === 'applied').length;
}

function renderJobs(jobs) {
  const list  = document.getElementById('jobs-list');
  const empty = document.getElementById('empty-state');
  const label = document.getElementById('results-label');

  label.textContent = jobs.length + ' job' + (jobs.length !== 1 ? 's' : '');

  if (!jobs.length) {
    list.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.style.display  = 'flex';

  const today = new Date().toISOString().slice(0,10);

  list.innerHTML = jobs.map(job => {
    const status   = getStatus(job.id);
    const roleInfo = ROLE_TAGS[job.role] || { label: job.role, cls: '' };
    const isNew    = job.posted_date === today;
    const cc       = getCompanyColor(job.company);

    const pillCls = { new:'pill-new', saved:'pill-saved', applied:'pill-applied', skip:'pill-skip' }[status] || 'pill-new';
    const pillLbl = { new:'New', saved:'Saved', applied:'Applied', skip:'Skip' }[status] || 'New';

    return `
<div class="job-card status-${status}" id="card-${job.id}">
  <div>
    <div class="job-top">
      <div class="company-logo" style="background:${cc.bg};color:${cc.text};">${initials(job.company)}</div>
      <div>
        <div class="job-title">${job.title}</div>
        <div class="job-company">${job.company}</div>
      </div>
    </div>
    <div class="job-meta">
      <span class="role-tag ${roleInfo.cls}">${roleInfo.label}</span>
      ${isNew ? '<span class="new-badge">New</span>' : ''}
      ${job.date_confidence === 'maybe' ? '<span class="maybe-badge" title="No start date specified — verify before applying">date unconfirmed</span>' : ''}
      ${job.location ? `<span class="job-meta-item"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="2"/><path d="M6 1a4 4 0 014 4c0 3-4 7-4 7s-4-4-4-7a4 4 0 014-4z"/></svg>${job.location}</span>` : ''}
      ${job.start_date ? `<span class="job-meta-item"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="10" height="9" rx="1"/><path d="M4 1v2M8 1v2M1 5h10"/></svg>Starts ${job.start_date}</span>` : ''}
      ${job.type ? `<span class="job-meta-item" style="color:var(--muted);">· ${job.type}</span>` : ''}
      <span class="job-meta-item"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><path d="M6 3v3l2 1.5"/></svg>${job.source}</span>
    </div>
  </div>
  <div class="job-actions">
    <a class="apply-btn" href="${job.url}" target="_blank" rel="noopener">
      Apply
      <svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 9L9 2M9 2H4M9 2v5"/></svg>
    </a>
    <div class="action-btns">
      <button class="action-btn" title="Save" onclick="updateStatus('${job.id}','saved')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 1h8a1 1 0 011 1v9l-5-3-5 3V2a1 1 0 011-1z"/></svg>
      </button>
      <button class="action-btn" title="Mark applied" onclick="updateStatus('${job.id}','applied')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6.5l2.5 2.5 5.5-5"/></svg>
      </button>
      <button class="action-btn" title="Skip" onclick="updateStatus('${job.id}','skip')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l8 8M10 2l-8 8"/></svg>
      </button>
    </div>
    <span class="status-pill ${pillCls}">${pillLbl}</span>
  </div>
</div>`;
  }).join('');
}

function updateStatus(id, status) {
  const cur = getStatus(id);
  setStatus(id, cur === status ? 'new' : status);
  applyFilters();
  renderStats();
}

let activeRole = 'all', activeStatus = 'all', sortBy = 'date-desc', searchQuery = '', hideMaybe = false;

document.getElementById('toggle-maybe').addEventListener('click', function() {
  hideMaybe = !hideMaybe;
  this.classList.toggle('active', hideMaybe);
  applyFilters();
});

function applyFilters() {
  let jobs = [...allJobs];

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    jobs = jobs.filter(j =>
      j.title.toLowerCase().includes(q) ||
      j.company.toLowerCase().includes(q) ||
      (j.location||'').toLowerCase().includes(q)
    );
  }

  if (activeRole !== 'all')   jobs = jobs.filter(j => j.role === activeRole);
  if (activeStatus !== 'all') jobs = jobs.filter(j => getStatus(j.id) === activeStatus);
  if (hideMaybe)              jobs = jobs.filter(j => j.date_confidence !== 'maybe');

  jobs.sort((a,b) => {
    if (sortBy === 'date-desc') return new Date(b.posted_date) - new Date(a.posted_date);
    if (sortBy === 'date-asc')  return new Date(a.posted_date) - new Date(b.posted_date);
    if (sortBy === 'company')   return a.company.localeCompare(b.company);
    return 0;
  });

  renderJobs(jobs);
  renderStats();
}

document.querySelectorAll('#role-filters .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#role-filters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRole = btn.dataset.role;
    applyFilters();
  });
});

document.querySelectorAll('#status-filters .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#status-filters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = btn.dataset.status;
    applyFilters();
  });
});

document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value; applyFilters(); });
document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value.trim(); applyFilters(); });

async function loadJobs() {
  try {
    const res  = await fetch('jobs.json?_=' + Date.now());
    const data = await res.json();
    allJobs    = data.jobs || [];
    const d    = new Date(data.last_updated || new Date());
    const fmt  = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' at ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    document.getElementById('last-updated').textContent  = 'Updated ' + fmt;
    document.getElementById('footer-updated').textContent = 'Last scraped: ' + fmt;
  } catch {
    allJobs = getSampleJobs();
    document.getElementById('last-updated').textContent  = 'Demo mode — connect jobs.json for live data';
    document.getElementById('footer-updated').textContent = 'Place jobs.json in the same folder to go live';
  }
  document.getElementById('skeleton-list').style.display = 'none';
  document.getElementById('jobs-list').style.display = 'flex';
  applyFilters();
}

async function loadRunLog() {
  try {
    const res  = await fetch('run_log.json?_=' + Date.now());
    const data = await res.json();
    const grid = document.getElementById('source-grid');
    const panel = document.getElementById('source-health');
    if (!data.sources) return;
    panel.style.display = 'block';
    grid.innerHTML = Object.entries(data.sources).map(([name, info]) => {
      const cls = info.status === 'ok'
        ? (info.raw_count > 0 ? 'source-ok' : 'source-none')
        : 'source-error';
      const dot = info.status === 'ok' ? (info.raw_count > 0 ? '●' : '○') : '✗';
      return `<span class="source-pill ${cls}">${dot} ${name} (${info.raw_count})</span>`;
    }).join('');
  } catch { /* run_log not available yet */ }
}

loadRunLog();
